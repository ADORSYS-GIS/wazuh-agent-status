name: Build and Release Binaries for Linux (amd64), macOS (AMD64, ARM64)

on:
  push:
    branches:
      - main
      - develop
      - user-main
    tags:
      - 'v*'
    paths:
      - 'wazuh-agent-status-client/**'
      - 'wazuh-agent-status/**'
      - '.github/workflows/release.yaml'

env:
  GO_VERSION: 1.22
  CLIENT_APP_NAME: wazuh-agent-status-client
  SERVER_APP_NAME: wazuh-agent-status

jobs:
  build-linux:
    name: Build for Linux AMD64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libdbusmenu-glib-dev \
            libgtk-3-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf2.0-dev \
            libatk1.0-dev

      - name: Build client binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Build server binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Upload Linux client binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/
          
      - name: Upload Linux server binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}
          path: | 
            ${{ env.SERVER_APP_NAME }}/dist/
          
  build-macos:
    name: Build for macOS (AMD64, ARM64)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14-large
            arch: amd64
          - os: macos-latest
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install MacOS Dependencies
        run: |
          brew install gtk+3

      - name: Build client binary for macOS (${{ matrix.arch }})
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Build server binary for macOS (${{ matrix.arch }})
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Upload MacOS client binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/
          
      - name: Upload MacOS server binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}
          path: |
            ${{ env.SERVER_APP_NAME }}/dist/
       
  build-windows:
    name: Build for Windows AMD64
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set version
        id: set_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}
          
      - name: Build client binary for windows
        run: |
          go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}' -H=windowsgui" -o ./dist/${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}.exe

      - name: Build server binary for windows
        run: |
          go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}.exe

      - name: Upload windows client binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/

      - name: Upload windows server binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}
          path: |
            ${{ env.SERVER_APP_NAME }}/dist/
  
  update-changelog-and-checksums:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    needs:
      - build-linux
      - build-macos
      - build-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: "0"
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: ./dist/

      - name: Configure git user
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Generate checksums
        run: |
          # Calculate binary checksums and strip directory prefix
          find dist -type f -exec sha256sum {} + | sed 's|  dist/[^/]*/|  |' > checksums.sha256
          # Calculate script checksums and keep paths
          find scripts -type f -exec sha256sum {} + >> checksums.sha256
          cat checksums.sha256

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
          
      - name: Commit and push changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add CHANGELOG.md checksums.sha256
            git commit -m "docs: update CHANGELOG.md and checksums [skip ci]"
            git push origin ${{ github.head_ref || github.ref_name }}
          else
            echo "No changes to commit"
          fi
      
      - name: Upload Checksums
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: checksums.sha256

  release:
    name: Release
    permissions:
      contents: write
    needs:
      - update-changelog-and-checksums
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: ./dist/

      - name: Generate release notes (latest only)
        id: git_cliff
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release-notes.md

      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${GITHUB_REF#refs/tags/}" == *"rc"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: |
            ./dist/**/*
          body: ${{ steps.git_cliff.outputs.content }}
          prerelease: ${{ steps.prerelease.outputs.PRERELEASE }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}