name: Build and Release Binaries for Linux (amd64), macOS (AMD64, ARM64)

on:
  push:
    tags:
      - 'v*'

env:
  SERVER_DIR: wazuh-agent-status-rust-server
  CLIENT_DIR: wazuh-agent-status-rust-client
  CLIENT_APP_NAME: wazuh-agent-status-client
  SERVER_APP_NAME: wazuh-agent-status

jobs:
  build-linux:
    name: Build for Linux AMD64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsoup-3.0-dev libwebkit2gtk-4.0-dev

      - name: Build Rust Server
        run: |
          cd ${{ env.SERVER_DIR }}
          cargo build --release
          mkdir -p ../dist
          cp target/release/wazuh-agent-status-rust-server ../dist/${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Build Tauri Client (Tray App)
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm install
          npm run tauri build
          # Rename to match installer expectations
          cp src-tauri/target/release/wazuh-agent-status ../dist/${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Upload Linux client binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}
          path: dist/${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}
          
      - name: Upload Linux server binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}
          path: dist/${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}

  build-macos:
    name: Build for macOS (AMD64, ARM64)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14-large
            arch: amd64
          - os: macos-latest
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Build Rust Server
        run: |
          cd ${{ env.SERVER_DIR }}
          cargo build --release
          mkdir -p ../dist
          cp target/release/wazuh-agent-status-rust-server ../dist/${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Build Tauri Client (Tray App)
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm install
          npm run tauri build
          cp src-tauri/target/release/wazuh-agent-status ../dist/${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Upload MacOS client binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}
          path: dist/${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}
          
      - name: Upload MacOS server binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}
          path: dist/${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}

  build-windows:
    name: Build for Windows AMD64
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set version
        id: set_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Build Rust Server
        run: |
          cd ${{ env.SERVER_DIR }}
          cargo build --release
          if not exist ..\dist mkdir ..\dist
          copy target\release\wazuh-agent-status-rust-server.exe ..\dist\${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}.exe
        shell: cmd
      - name: Build Tauri Client (Tray App)
        shell: bash
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm install
          npm run tauri build
          cp src-tauri/target/release/wazuh-agent-status.exe ../dist/${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}.exe

      - name: Upload windows client binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}
          path: dist/${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}.exe
      - name: Upload windows server binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}
          path: dist/${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}.exe

  release:
    name: Release
    permissions: write-all
    needs:
      - build-linux
      - build-macos
      - build-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./dist/

      - name: Configure git user
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Generate checksums
        run: |
          # Calculate binary checksums and strip directory prefix
          find dist -type f -exec sha256sum {} + | sed 's|  dist/[^/]*/|  |' > checksums.sha256
          # Calculate script checksums and keep paths
          find scripts -type f -exec sha256sum {} + >> checksums.sha256
          cat checksums.sha256

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
          
      - name: Commit and push changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add CHANGELOG.md checksums.sha256
            git commit -m "docs: update CHANGELOG.md and checksums [skip ci]"
            git push origin ${{ github.head_ref || github.ref_name }}
          else
            echo "No changes to commit"
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: checksums.sha256

  release:
    name: Release
    permissions:
      contents: write
    needs:
      - update-changelog-and-checksums
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./dist/

      - name: Generate checksums
        run: |
          # Calculate binary checksums and strip directory prefix
          find dist -type f -exec sha256sum {} + | sed 's|  dist/[^/]*/|  |' > checksums.sha256
          # Calculate script checksums and keep paths
          find scripts -type f -exec sha256sum {} + >> checksums.sha256
          cat checksums.sha256

      - name: Generate release notes (latest only)
        id: git_cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release-notes.md

      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${GITHUB_REF#refs/tags/}" == *"rc"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@c959fe0890469802913e8598b7a0d5b2ba1d57ed # v2.2.1
        with:
          files: |
            dist/**/*
            checksums.sha256
          body: ${{ steps.git_cliff.outputs.content }}
          prerelease: ${{ steps.prerelease.outputs.PRERELEASE }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update CHANGELOG.md and checksums"
          title: "Update Changelog and Checksums"
          body: |
            This PR updates the CHANGELOG.md and the unified checksums file.
            - Generated using git-cliff and sha256sum
            - Includes both binary and script checksums
            - Triggered by: ${{ github.event_name }}
          branch: update-changelog-${{ github.run_id }}
          base: user-main
          delete-branch: true
          labels: documentation, automated-pr
