name: Build and Release Binaries for Linux (amd64), macOS (AMD64, ARM64)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

env:
  GO_VERSION: 1.22
  CLIENT_APP_NAME: wazuh-agent-status-client
  SERVER_APP_NAME: wazuh-agent-status

jobs:
  build-linux:
    name: Build for Linux AMD64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libdbusmenu-glib-dev \
            libgtk-3-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf2.0-dev \
            libatk1.0-dev

      - name: Build client binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Build server binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Upload Linux client binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/
          
      - name: Upload Linux server binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}
          path: | 
            ${{ env.SERVER_APP_NAME }}/dist/
          
  build-macos:
    name: Build for macOS (AMD64, ARM64)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14-large
            arch: amd64
          - os: macos-latest
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install MacOS Dependencies
        run: |
          brew install gtk+3

      - name: Build client binary for macOS (${{ matrix.arch }})
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Build server binary for macOS (${{ matrix.arch }})
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Upload MacOS client binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/
          
      - name: Upload MacOS server binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}
          path: |
            ${{ env.SERVER_APP_NAME }}/dist/
       
  build-windows:
    name: Build for Windows AMD64
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          
      - name: Build client binary for windows
        run: |
          go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}' -H=windowsgui" -o ./dist/${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}.exe

      - name: Build server binary for windows
        run: |
          go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}.exe


      - name: Upload windows client binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/
          
      - name: Upload windows server binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}
          path: |
            ${{ env.SERVER_APP_NAME }}/dist/
          
  release:
    name: Release
    permissions: write-all
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/

      - name: Generate checksums
        run: |
          # Calculate binary checksums and strip directory prefix
          find dist -type f -exec sha256sum {} + | sed 's|  dist/[^/]*/|  |' > ${{ env.CLIENT_APP_NAME }}/checksums.sha256
          # Calculate script checksums and keep paths
          find scripts -type f -exec sha256sum {} + >> ${{ env.CLIENT_APP_NAME }}/checksums.sha256
          cat ${{ env.CLIENT_APP_NAME }}/checksums.sha256

      - name: Generate release notes (latest only)
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release-notes.md 

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./dist/**/*
            ${{ env.CLIENT_APP_NAME }}/checksums.sha256
          body: ${{ steps.git_cliff.outputs.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update CHANGELOG.md and checksums"
          title: "Update Changelog and Checksums"
          body: |
            This PR updates the CHANGELOG.md and the unified checksums file.
            - Generated using git-cliff and sha256sum
            - Includes both binary and script checksums
            - Triggered by: ${{ github.event_name }}
          branch: update-changelog-${{ github.run_id }}
          base: user-main
          delete-branch: true
          labels: documentation, automated-pr