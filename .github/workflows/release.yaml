name: Build and Release Binaries for Linux (amd64), macOS (AMD64, ARM64)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

env:
  SERVER_DIR: wazuh-agent-status-rust-server
  CLIENT_DIR: wazuh-agent-status-rust-client
  CLIENT_APP_NAME: wazuh-agent-status-client
  SERVER_APP_NAME: wazuh-agent-status

jobs:
  build-linux:
    name: Build for Linux AMD64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsoup-3.0-dev libwebkit2gtk-4.0-dev

      - name: Build Rust Server
        run: |
          cd ${{ env.SERVER_DIR }}
          cargo build --release
          mkdir -p ../dist
          cp target/release/wazuh-agent-status-rust-server ../dist/${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Build Tauri Client (Tray App)
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm install
          npm run tauri build
          # Rename to match installer expectations
          cp src-tauri/target/release/wazuh-agent-status ../dist/${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Upload Linux client binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}
          path: dist/${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}
          
      - name: Upload Linux server binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}
          path: dist/${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}

  build-macos:
    name: Build for macOS (AMD64, ARM64)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14-large
            arch: amd64
          - os: macos-latest
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server
        run: |
          cd ${{ env.SERVER_DIR }}
          cargo build --release
          mkdir -p ../dist
          cp target/release/wazuh-agent-status-rust-server ../dist/${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Build Tauri Client (Tray App)
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm install
          npm run tauri build
          cp src-tauri/target/release/wazuh-agent-status ../dist/${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Upload MacOS client binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}
          path: dist/${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}
          
      - name: Upload MacOS server binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}
          path: dist/${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}

  build-windows:
    name: Build for Windows AMD64
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Server
        run: |
          cd ${{ env.SERVER_DIR }}
          cargo build --release
          if not exist ..\dist mkdir ..\dist
          copy target\release\wazuh-agent-status-rust-server.exe ..\dist\${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}.exe
        shell: cmd

      - name: Build Tauri Client (Tray App)
        shell: bash
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm install
          npm run tauri build
          cp src-tauri/target/release/wazuh-agent-status.exe ../dist/${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}.exe

      - name: Upload windows client binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}
          path: dist/${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}.exe
          
      - name: Upload windows server binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}
          path: dist/${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}.exe

  release:
    name: Release
    permissions: write-all
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/

      - name: Generate checksums
        run: |
          # Calculate binary checksums and strip directory prefix
          find dist -type f -exec sha256sum {} + | sed 's|  dist/[^/]*/|  |' > checksums.sha256
          # Calculate script checksums and keep paths
          find scripts -type f -exec sha256sum {} + >> checksums.sha256
          cat checksums.sha256

      - name: Generate release notes (latest only)
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release-notes.md 

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/**/*
            checksums.sha256
          body: ${{ steps.git_cliff.outputs.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update CHANGELOG.md and checksums"
          title: "Update Changelog and Checksums"
          body: |
            This PR updates the CHANGELOG.md and the unified checksums file.
            - Generated using git-cliff and sha256sum
            - Includes both binary and script checksums
            - Triggered by: ${{ github.event_name }}
          branch: update-changelog-${{ github.run_id }}
          base: user-main
          delete-branch: true
          labels: documentation, automated-pr