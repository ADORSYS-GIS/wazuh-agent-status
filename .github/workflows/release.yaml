name: Build and Release Binaries for Linux (amd64), macOS (AMD64, ARM64)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

env:
  GO_VERSION: 1.22
  CLIENT_APP_NAME: wazuh-agent-status-client
  SERVER_APP_NAME: wazuh-agent-status

jobs:
  build-linux:
    name: Build for Linux AMD64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libdbusmenu-glib-dev \
            libgtk-3-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf2.0-dev \
            libatk1.0-dev

      - name: Build client binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Build server binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}

      - name: Upload Linux client binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-linux-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/
          
      - name: Upload Linux server binaries
        if: ${{ !env.ACT }} 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-linux-${{ matrix.arch }}
          path: | 
            ${{ env.SERVER_APP_NAME }}/dist/
          
  build-macos:
    name: Build for macOS (AMD64, ARM64)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14-large
            arch: amd64
          - os: macos-latest
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install MacOS Dependencies
        run: |
          brew install gtk+3

      - name: Build client binary for macOS (${{ matrix.arch }})
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Build server binary for macOS (${{ matrix.arch }})
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}

      - name: Upload MacOS client binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-darwin-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/
          
      - name: Upload MacOS server binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-darwin-${{ matrix.arch }}
          path: |
            ${{ env.SERVER_APP_NAME }}/dist/
       
  build-windows:
    name: Build for Windows AMD64
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: set_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi
      - name: Compute Windows numeric version for ps2exe
        id: winver
        shell: pwsh
        run: |
          $raw = '${{ steps.set_version.outputs.version }}'
          # Drop leading 'v' if present
          $ver = $raw.TrimStart('v')

          # Grab the first numeric dotted sequence (up to 4 parts)
          if ($ver -match '(\d+(?:\.\d+){0,3})') {
            $ver = $Matches[1]
          } else {
            # Non-numeric branch names like dev-abcdef12
            $ver = "0.0.0.${{ github.run_number }}"
          }

          # Normalize to 4 parts for ps2exe
          $parts = $ver.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $ver = ($parts[0..3] -join '.')

          "win_version=$ver" >> $env:GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          
      - name: Build client binary for windows
        run: |
          go build -C ./${{ env.CLIENT_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}' -H=windowsgui" -o ./dist/${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}.exe

      - name: Build server binary for windows
        run: |
          go build -C ./${{ env.SERVER_APP_NAME }} -ldflags="-X 'main.Version=${{ steps.set_version.outputs.version }}'" -o ./dist/${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}.exe

      - name: Install ps2exe module
        shell: pwsh
        run: |
          Install-Module -Name ps2exe -Force -Scope CurrentUser

      - name: Build adorsys-update.ps1 to executable
        shell: pwsh
        run: |
          Import-Module ps2exe
          $scriptPath = "scripts/adorsys-update.ps1"
          $outputPath = "scripts/dist/adorsys-update-windows-${{ matrix.arch }}.exe"
          New-Item -ItemType Directory -Force -Path "scripts/dist" | Out-Null
          Invoke-ps2exe `
            -inputFile $scriptPath `
            -outputFile $outputPath `
            -noConsole `
            -title "Wazuh Agent Update Wizard" `
            -version "${{ steps.winver.outputs.win_version }}" `
            -company "ADORSYS" `
            -product "Wazuh Agent Update Wizard" `
            -copyright "Copyright (c) 2025 ADORSYS" `
            -requireAdmin

      - name: Upload windows client binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CLIENT_APP_NAME }}-windows-${{ matrix.arch }}
          path: |
            ${{ env.CLIENT_APP_NAME }}/dist/
          
      - name: Upload windows server binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVER_APP_NAME }}-windows-${{ matrix.arch }}
          path: |
            ${{ env.SERVER_APP_NAME }}/dist/

      - name: Upload adorsys-update executable
        uses: actions/upload-artifact@v4
        with:
          name: adorsys-update-windows-${{ matrix.arch }}
          path: |
            scripts/dist/
          
  release:
    name: Release
    permissions: write-all
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/

      - name: Generate release notes (latest only)
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: ./dist/**/*
          body: ${{ steps.git_cliff.outputs.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update CHANGELOG.md"
          title: "Update Changelog"
          body: |
            This PR updates the CHANGELOG.md to include all releases.
            - Generated using git-cliff
            - Triggered by: ${{ github.event_name }}
          branch: update-changelog-${{ github.run_id }}
          base: user-main
          delete-branch: true
          labels: documentation, automated-pr