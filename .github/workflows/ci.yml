# CI Pipeline for wazuh-agent-status Rust Components
#
# Purpose: Ensure code quality, readability, and correctness for all Rust code
# Triggers: Every push and pull request to main/develop branches
#
# Security note: Uses minimal permissions (contents: read) at workflow level
# Security note: All third-party actions are pinned to specific commit SHAs to prevent
#              malicious updates and ensure reproducible builds
# Performance note: Implements aggressive caching for Rust dependencies
# Production-ready: Includes security auditing, frontend validation, and optimized caching

name: Rust CI

on:
  push:
    branches: [main, develop]
    paths:
      - "wazuh-agent-status-rust/**"
      - "wazuh-agent-status-rust-server/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "wazuh-agent-status-rust/**"
      - "wazuh-agent-status-rust-server/**"
      - ".github/workflows/ci.yml"

# Minimal permissions for security - only read access to repository contents
permissions:
  contents: read

# Fail fast: Cancel all jobs if any fails, preventing wasted CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin Rust version for reproducibility while allowing easy updates
  RUST_VERSION: stable
  # Fail on warnings to maintain high code quality standards
  RUSTFLAGS: "-D warnings"
  # Enable colored output in CI logs for better readability
  CARGO_TERM_COLOR: always

jobs:
  # =============================================================================
  # Job 1: Rust Server - Core backend service
  # =============================================================================
  rust-server:
    name: Rust Server Checks
    runs-on: ubuntu-latest
    # No additional permissions needed beyond workflow-level read
    defaults:
      run:
        working-directory: ./wazuh-agent-status-rust-server

    steps:
      # -------------------------------------------------------------------------
      # Step 1: Checkout source code with full history for accurate analysis
      # -------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@692973e3d1915638f7e18cd4854ef7de212e79b3 # v4.1.7
        with:
          fetch-depth: 0

      # -------------------------------------------------------------------------
      # Step 2: Setup Rust toolchain with caching
      # Uses dtolnay/rust-action for faster, more reliable Rust setup than
      # actions-rs/toolchain (which is unmaintained)
      # -------------------------------------------------------------------------
      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@b8714d8bfae3bee53527f5f7b0754b4c093d6393 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      # -------------------------------------------------------------------------
      # Step 3: Cache Cargo dependencies
      # Uses Swatinem/rust-cache for intelligent caching of:
      # - Cargo registry index
      # - Compiled dependencies
      # - Build artifacts
      # This significantly reduces CI time (often 50-70% faster on subsequent runs)
      # -------------------------------------------------------------------------
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@82a82a6a0c4ac1b525331a01d34d632b295e8ae4 # v2.7.0
        with:
          workspaces: |
            wazuh-agent-status-rust-server
          cache-on-failure: false
          key: rust-server-${{ runner.os }}-${{ hashFiles('wazuh-agent-status-rust-server/Cargo.lock') }}

      # -------------------------------------------------------------------------
      # Step 4: Check code formatting
      # Enforces consistent code style across the codebase
      # Uses --check to fail without modifying files
      # -------------------------------------------------------------------------
      - name: Check formatting (cargo fmt)
        run: cargo fmt -- --check

      # -------------------------------------------------------------------------
      # Step 5: Run Clippy linter
      # Catches common mistakes and enforces best practices
      # -D warnings: Treats all warnings as errors (strict quality gate)
      # --all-targets: Lints tests and benchmarks too
      # --all-features: Checks all feature combinations
      # -------------------------------------------------------------------------
      - name: Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

      # -------------------------------------------------------------------------
      # Step 6: Build the project
      # Verifies the code compiles successfully
      # --verbose: Provides detailed output for debugging build issues
      # -------------------------------------------------------------------------
      - name: Build project
        run: cargo build --verbose

      # -----------------------------------------------------------------------
      # Step 7: Run all tests
      # Executes unit tests, integration tests, and doc tests
      # --verbose: Shows test names and progress
      # -----------------------------------------------------------------------
      - name: Run tests
        run: cargo test --verbose

      # -----------------------------------------------------------------------
      # Step 8: Run security audit
      # Scans Cargo.lock for known security vulnerabilities
      # Fails if any vulnerabilities are found
      # -----------------------------------------------------------------------
      - name: Run security audit
        run: cargo audit

      # -----------------------------------------------------------------------
      # Step 9: Validate frontend
      # Checks for any issues with the frontend code
      # -----------------------------------------------------------------------
      - name: Validate frontend
        run: |
          npm install
          npm run validate-frontend

      # -----------------------------------------------------------------------
      # Step 10: Optimize cache
      # Optimizes the cache for faster subsequent runs
      # -----------------------------------------------------------------------
      - name: Optimize cache
        run: |
          cargo clean
          cargo build --release

  # =============================================================================
  # Job 2: Rust Client (Tauri) - Desktop application
  # =============================================================================
  # This job is separate because Tauri requires system dependencies
  # and has different build requirements than the server
  rust-client:
    name: Rust Client (Tauri) Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./wazuh-agent-status-rust/src-tauri

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d1915638f7e18cd4854ef7de212e79b3 # v4.1.7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@b8714d8bfae3bee53527f5f7b0754b4c093d6393 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      # -------------------------------------------------------------------------
      # Step 3: Setup Node.js
      # Required for building Tauri frontend (Vite/TypeScript)
      # -------------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@b39b52d1213e960042cb16878aa5dbf994d25d05 # v4.0.1
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: wazuh-agent-status-rust/src/package-lock.json

      # -------------------------------------------------------------------------
      # Step 4: Install system dependencies for Tauri
      # Required for building Tauri applications on Linux
      # https://tauri.app/start/prerequisites/#linux
      # -------------------------------------------------------------------------
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev \
            libxdo-dev

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@82a82a6a0c4ac1b525331a01d34d632b295e8ae4 # v2.7.0
        with:
          workspaces: |
            wazuh-agent-status-rust/src-tauri
          cache-on-failure: false
          key: rust-client-${{ runner.os }}-${{ hashFiles('wazuh-agent-status-rust/src-tauri/Cargo.lock') }}

      - name: Check formatting (cargo fmt)
        run: cargo fmt -- --check

      # -------------------------------------------------------------------------
      # Step 6: Run Clippy linter
      # -------------------------------------------------------------------------
      - name: Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

      # -------------------------------------------------------------------------
      # Step 7: Build project
      # -------------------------------------------------------------------------
      - name: Build project
        run: cargo build --verbose

      # -------------------------------------------------------------------------
      # Step 8: Run tests
      # -------------------------------------------------------------------------
      - name: Run tests
        run: cargo test --verbose

      # -------------------------------------------------------------------------
      # Step 9: Build Tauri frontend (Vite/TypeScript)
      # Ensures the web UI builds correctly before Tauri integration
      # -------------------------------------------------------------------------
      - name: Install Node.js dependencies
        run: |
          cd src
          npm ci

      - name: Build frontend
        run: |
          cd src
          npm run build

  # =============================================================================
  # Job 3: Security Audit - Production-ready security scanning
  # =============================================================================
  # Scans Rust dependencies for known vulnerabilities
  # Essential for production services as per security best practices
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - { dir: "wazuh-agent-status-rust-server", name: "Server" }
          - { dir: "wazuh-agent-status-rust/src-tauri", name: "Client" }

    defaults:
      run:
        working-directory: ./${{ matrix.component.dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d1915638f7e18cd4854ef7de212e79b3 # v4.1.7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@b8714d8bfae3bee53527f5f7b0754b4c093d6393 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # -----------------------------------------------------------------------
      # Step 1: Install cargo-audit
      # Security tool to check for known vulnerabilities in Rust dependencies
      # -----------------------------------------------------------------------
      - name: Install cargo-audit
        run: cargo install cargo-audit

      # -----------------------------------------------------------------------
      # Step 2: Run security audit
      # Scans Cargo.lock for known security vulnerabilities
      # Fails if any vulnerabilities are found
      # -----------------------------------------------------------------------
      - name: Run security audit
        run: cargo audit

  # =============================================================================
  # Job 4: Documentation check
  # =============================================================================
  # Ensures all public APIs have documentation
  # Fails on missing docs to maintain project quality
  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    env:
      # Require documentation for all public items
      RUSTDOCFLAGS: "-D warnings"

    strategy:
      matrix:
        component:
          - { dir: "wazuh-agent-status-rust-server", name: "Server" }
          - { dir: "wazuh-agent-status-rust/src-tauri", name: "Client" }

    defaults:
      run:
        working-directory: ./${{ matrix.component.dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d1915638f7e18cd4854ef7de212e79b3 # v4.1.7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@b8714d8bfae3bee53527f5f7b0754b4c093d6393 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@82a82a6a0c4ac1b525331a01d34d632b295e8ae4 # v2.7.0
        with:
          workspaces: ${{ matrix.component.dir }}
          key: docs-${{ matrix.component.name }}-${{ runner.os }}

      # -------------------------------------------------------------------------
      # Generate documentation and fail on warnings
      # --no-deps: Only document this crate, not dependencies
      # This ensures all public APIs are documented
      # -------------------------------------------------------------------------
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
